# render.yaml — Render Blueprint for ETHWatch
# Deploy at: https://dashboard.render.com/select-repo → New Blueprint
#
# THREE services from the same repo:
#   1. eth-anomaly-dashboard  — Streamlit UI  (Docker, Web Service)
#   2. eth-anomaly-monitor    — Block scanner (Docker, Web Service + /health)
#   3. eth-keepalive-cron     — Pings both every 3 min to prevent sleep
#
# ─────────────────────────────────────────────────────────────────────
# IMPORTANT: For true 24/7 uptime, also add an external monitor:
#   → Sign up FREE at https://uptimerobot.com
#   → Add HTTP monitor for: https://eth-anomaly-monitor.onrender.com/
#   → Set check interval: Every 5 minutes
#   → This pings from outside Render, guaranteed to never sleep.
# ─────────────────────────────────────────────────────────────────────

services:

  # ── 1. Streamlit Dashboard ────────────────────────────────────────────
  - type: web
    name: eth-anomaly-dashboard
    runtime: docker
    plan: free
    autoDeploy: true
    # Override the Dockerfile CMD to run the dashboard instead of the monitor
    dockerCommand: >-
      python -m streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.enableCORS false
      --server.enableXsrfProtection false
      --server.headless true
    healthCheckPath: /
    envVars:
      - key: ETH_RPC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HIGH_VALUE_THRESHOLD
        value: "10"
      - key: HIGH_GAS_PRICE_THRESHOLD
        value: "100"

  # ── 2. Monitor (Web Service — uses Dockerfile CMD: python monitor.py) ──
  # Docker mode: no build/start command needed — Dockerfile CMD handles it.
  # Render health-checks the /health HTTP endpoint to keep the service alive.
  - type: web
    name: eth-anomaly-monitor
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ETH_RPC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HIGH_VALUE_THRESHOLD
        value: "10"
      - key: HIGH_GAS_PRICE_THRESHOLD
        value: "100"

  # ── 3. Keep-Alive Cron (pings both services every 3 min) ─────────────
  # Increased from */5 to */3 to be more aggressive against free-tier sleep.
  - type: cron
    name: eth-keepalive-cron
    runtime: docker
    plan: free
    schedule: "*/3 * * * *"
    dockerCommand: >-
      python -c "
      import urllib.request, sys, time;
      services = [
        'https://eth-anomaly-dashboard.onrender.com/',
        'https://eth-anomaly-monitor.onrender.com/',
      ];
      failed = 0;
      for url in services:
        try:
          r = urllib.request.urlopen(url, timeout=25);
          print(f'OK [{r.status}]: {url}');
        except Exception as e:
          print(f'FAIL: {url} — {e}', file=sys.stderr);
          failed += 1;
      print(f'Keep-alive done. {len(services)-failed}/{len(services)} services reachable.');
      sys.exit(0 if failed == 0 else 1)
      "
