# render.yaml — Render Blueprint for ETHWatch
# Deploy at: https://dashboard.render.com/select-repo → New Blueprint
#
# THREE services from the same repo:
#   1. eth-anomaly-dashboard  — Streamlit UI  (Docker, Web Service)
#   2. eth-anomaly-monitor    — Block scanner (Docker, Web Service + /health)
#   3. eth-keepalive-cron     — Pings both every 3 min to prevent sleep
#
# ─────────────────────────────────────────────────────────────────────
# IMPORTANT: For true 24/7 uptime on FREE tier, set UptimeRobot to
# use GET method (not HEAD) to avoid 501 errors:
#   → https://uptimerobot.com → Edit Monitor → HTTP Method: GET
#   → URL: https://eth-anomaly-monitor.onrender.com/
#   → Check interval: Every 5 minutes
# ─────────────────────────────────────────────────────────────────────

services:

  # ── 1. Streamlit Dashboard ────────────────────────────────────────────
  - type: web
    name: eth-anomaly-dashboard
    runtime: docker
    plan: free
    autoDeploy: true
    dockerCommand: >-
      python -m streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.enableCORS false
      --server.enableXsrfProtection false
      --server.headless true
    healthCheckPath: /
    envVars:
      - key: ETH_RPC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HIGH_VALUE_THRESHOLD
        value: "10"
      - key: HIGH_GAS_PRICE_THRESHOLD
        value: "100"

  # ── 2. Monitor (Web Service — health endpoint handles GET + HEAD + POST) ──
  - type: web
    name: eth-anomaly-monitor
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ETH_RPC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HIGH_VALUE_THRESHOLD
        value: "10"
      - key: HIGH_GAS_PRICE_THRESHOLD
        value: "100"

  # ── 3. Keep-Alive Cron ── pings both services with GET every 3 min ────
  - type: cron
    name: eth-keepalive-cron
    runtime: docker
    plan: free
    schedule: "*/3 * * * *"
    dockerCommand: python keepalive.py
