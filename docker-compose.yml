version: '3.8'

services:
  monitor:
    build: .
    container_name: eth-monitor
    restart: unless-stopped
    command: python monitor.py
    env_file:
      - .env
    volumes:
      - monitor_data:/app

  dashboard:
    build: .
    container_name: eth-dashboard
    restart: unless-stopped
    command: streamlit run app.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - monitor
    volumes:
      - monitor_data:/app

volumes:
  monitor_data:
